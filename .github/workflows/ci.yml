name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format

      - name: Check C/C++ formatting
        run: |
          find . -name '*.c' -o -name '*.h' -o -name '*.cc' -o -name '*.cpp' -o -name '*.hpp' | \
            xargs clang-format --dry-run --Werror

      - name: Install buildifier
        run: |
          curl -fsSL https://github.com/bazelbuild/buildtools/releases/download/v7.3.1/buildifier-linux-amd64 \
            -o buildifier
          chmod +x buildifier
          sudo mv buildifier /usr/local/bin/buildifier

      - name: Check Bazel formatting
        run: buildifier -mode=check -lint=warn -r .

      - name: Run shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning

  build-and-test:
    runs-on: ubuntu-22.04
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Bazelisk (pinned)
        run: |
          curl -fsSL https://github.com/bazelbuild/bazelisk/releases/download/v1.25.0/bazelisk-linux-amd64 \
            -o bazel
          chmod +x bazel
          sudo mv bazel /usr/local/bin/bazel

      - name: Install DPDK and dependencies
        run: sudo apt-get update && sudo apt-get install -y dpdk-dev libnuma-dev

      - name: Build and install llama.cpp
        run: sudo ./third_party/install_llama_cpp.sh

      - name: Build all targets
        run: bazel build //...

      - name: Run tests
        run: bazel test //... --test_tag_filters=ci --test_output=all
