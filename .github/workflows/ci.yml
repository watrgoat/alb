name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install DPDK and dependencies
        run: sudo apt-get update && sudo apt-get install -y dpdk-dev libnuma-dev

      - name: Build all targets
        run: bazel build //...

      - name: Run all tests
        run: bazel test //... --test_output=errors --spawn_strategy=local
